<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Main prism gradient with color cycling -->
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb">
        <animate attributeName="stop-color" values="#2563eb;#8b5cf6;#ec4899;#2563eb" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#2563eb;#8b5cf6;#06b6d4" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#06b6d4;#2563eb;#10b981" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Refracted light beams -->
    <linearGradient id="beam1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <!-- Input light beam -->
    <linearGradient id="inputBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Traveling light pulse on input beam -->
    <linearGradient id="inputPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0">
        <animate attributeName="offset" values="-0.3;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.15" stop-color="#fff" stop-opacity="1">
        <animate attributeName="offset" values="-0.15;1.15" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.3" stop-color="#fff" stop-opacity="0">
        <animate attributeName="offset" values="0;1.3" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Prism face gradients -->
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Vertex glow radial -->
    <radialGradient id="vtxGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === Input light beam (white, entering left side of prism) === -->
  <line x1="40" y1="230" x2="180" y2="230" stroke="url(#inputBeam)" stroke-width="5" filter="url(#glow)"/>
  <!-- Traveling pulse along input beam -->
  <line x1="40" y1="230" x2="180" y2="230" stroke="url(#inputPulse)" stroke-width="7" filter="url(#glow)"/>

  <!-- === Refracted light beams (exiting right side with staggered pulse) === -->
  <!-- Red -->
  <line x1="330" y1="200" x2="490" y2="120" stroke="url(#beam1)" stroke-width="4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0s" repeatCount="indefinite"/>
  </line>
  <!-- Orange -->
  <line x1="330" y1="215" x2="490" y2="185" stroke="url(#beam2)" stroke-width="4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.2s" repeatCount="indefinite"/>
  </line>
  <!-- Green -->
  <line x1="330" y1="230" x2="490" y2="250" stroke="url(#beam3)" stroke-width="4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </line>
  <!-- Blue -->
  <line x1="330" y1="245" x2="490" y2="315" stroke="url(#beam4)" stroke-width="4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </line>
  <!-- Violet -->
  <line x1="330" y1="260" x2="490" y2="380" stroke="url(#beam5)" stroke-width="4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- === Spectrum endpoint dots (pulsing glow) === -->
  <circle cx="490" cy="120" r="6" fill="#ef4444" filter="url(#glow)">
    <animate attributeName="r" values="4;8;4" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="490" cy="185" r="6" fill="#f59e0b" filter="url(#glow)">
    <animate attributeName="r" values="4;8;4" dur="3s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="490" cy="250" r="6" fill="#10b981" filter="url(#glow)">
    <animate attributeName="r" values="4;8;4" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="490" cy="315" r="6" fill="#3b82f6" filter="url(#glow)">
    <animate attributeName="r" values="4;8;4" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="490" cy="380" r="6" fill="#a855f7" filter="url(#glow)">
    <animate attributeName="r" values="4;8;4" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- === Prism body — 3D triangular prism (breathing glow) === -->
  <!-- Front face -->
  <polygon points="256,80 160,380 352,380" fill="url(#prismGrad)" fill-opacity="0.12" stroke="url(#prismGrad)" stroke-width="2.5">
    <animate attributeName="fill-opacity" values="0.08;0.22;0.08" dur="5s" repeatCount="indefinite"/>
  </polygon>
  <!-- Left face shading -->
  <polygon points="256,80 160,380 190,395 270,95" fill="url(#faceLeft)" opacity="0.25">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="5s" repeatCount="indefinite"/>
  </polygon>
  <!-- Right face shading -->
  <polygon points="256,80 352,380 322,395 242,95" fill="url(#faceRight)" opacity="0.25">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>

  <!-- Prism edges (bright lines) -->
  <line x1="256" y1="80" x2="160" y2="380" stroke="url(#prismGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="80" x2="352" y2="380" stroke="url(#prismGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="160" y1="380" x2="352" y2="380" stroke="url(#prismGrad)" stroke-width="2" opacity="0.8"/>

  <!-- Inner refraction shimmer (floating horizontal light) -->
  <line x1="200" y1="230" x2="310" y2="230" stroke="white" stroke-width="1.5" opacity="0.08">
    <animate attributeName="opacity" values="0.04;0.18;0.04" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="220;240;220" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="220;240;220" dur="7s" repeatCount="indefinite"/>
  </line>
  <!-- Secondary shimmer -->
  <line x1="210" y1="270" x2="300" y2="270" stroke="white" stroke-width="1" opacity="0.05">
    <animate attributeName="opacity" values="0.02;0.12;0.02" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="260;290;260" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="260;290;260" dur="9s" repeatCount="indefinite"/>
  </line>

  <!-- === Top vertex glow (pulsing energy nexus) === -->
  <circle cx="256" cy="80" r="12" fill="url(#vtxGlow)" filter="url(#glowBig)">
    <animate attributeName="r" values="8;16;8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="80" r="4" fill="#fff" opacity="0.9">
    <animate attributeName="r" values="3;6;3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- === PrismOS-AI text === -->
  <text x="256" y="460" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="url(#prismGrad)">PrismOS-AI</text>
  <text x="256" y="490" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#94a3b8" letter-spacing="4">LOCAL-FIRST AI</text>
</svg>
