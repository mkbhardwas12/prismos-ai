<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Main prism gradient -->
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Refracted light beams -->
    <linearGradient id="beam1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <!-- Input light beam -->
    <linearGradient id="inputBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Prism face gradients -->
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="faceBottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Input light beam (white, entering left side of prism) -->
  <line x1="40" y1="230" x2="180" y2="230" stroke="url(#inputBeam)" stroke-width="6" filter="url(#glow)"/>

  <!-- Refracted light beams (exiting right side of prism) -->
  <line x1="330" y1="200" x2="490" y2="120" stroke="url(#beam1)" stroke-width="4" filter="url(#glow)"/>
  <line x1="330" y1="215" x2="490" y2="185" stroke="url(#beam2)" stroke-width="4" filter="url(#glow)"/>
  <line x1="330" y1="230" x2="490" y2="250" stroke="url(#beam3)" stroke-width="4" filter="url(#glow)"/>
  <line x1="330" y1="245" x2="490" y2="315" stroke="url(#beam4)" stroke-width="4" filter="url(#glow)"/>
  <line x1="330" y1="260" x2="490" y2="380" stroke="url(#beam5)" stroke-width="4" filter="url(#glow)"/>

  <!-- Prism body — 3D triangular prism -->
  <!-- Front face (triangle) -->
  <polygon points="256,80 160,380 352,380" fill="url(#prismGrad)" fill-opacity="0.15" stroke="url(#prismGrad)" stroke-width="2.5"/>

  <!-- Left face shading -->
  <polygon points="256,80 160,380 190,395 270,95" fill="url(#faceLeft)" opacity="0.3"/>

  <!-- Right face shading -->
  <polygon points="256,80 352,380 322,395 242,95" fill="url(#faceRight)" opacity="0.3"/>

  <!-- Prism edges (bright lines) -->
  <line x1="256" y1="80" x2="160" y2="380" stroke="url(#prismGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="256" y1="80" x2="352" y2="380" stroke="url(#prismGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="160" y1="380" x2="352" y2="380" stroke="url(#prismGrad)" stroke-width="2" opacity="0.8"/>

  <!-- Inner refraction highlight -->
  <line x1="200" y1="230" x2="310" y2="230" stroke="white" stroke-width="1" opacity="0.15"/>

  <!-- Top vertex glow point -->
  <circle cx="256" cy="80" r="6" fill="url(#prismGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Spectrum dots at beam endpoints -->
  <circle cx="490" cy="120" r="5" fill="#ef4444" filter="url(#glow)" opacity="0.8"/>
  <circle cx="490" cy="185" r="5" fill="#f59e0b" filter="url(#glow)" opacity="0.8"/>
  <circle cx="490" cy="250" r="5" fill="#10b981" filter="url(#glow)" opacity="0.8"/>
  <circle cx="490" cy="315" r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="490" cy="380" r="5" fill="#60a5fa" filter="url(#glow)" opacity="0.8"/>

  <!-- PrismOS-AI text -->
  <text x="256" y="460" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="url(#prismGrad)">PrismOS-AI</text>
  <text x="256" y="490" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#94a3b8" letter-spacing="4">LOCAL-FIRST AI</text>
</svg>
