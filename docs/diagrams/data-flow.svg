<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 680" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="680" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="698" height="678" rx="13" fill="none" stroke="#334155" stroke-width="0.5"/>

  <!-- Title -->
  <text x="350" y="33" text-anchor="middle" font-size="17" font-weight="700" fill="url(#cyan)" filter="url(#glow)">Intent Processing — Data Flow</text>

  <!-- Step 1: User Input -->
  <rect x="225" y="50" width="250" height="42" rx="21" fill="#164e63" fill-opacity="0.6" stroke="#22d3ee" stroke-width="1.2" filter="url(#s)"/>
  <text x="350" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">👤 User Types Intent</text>
  <text x="350" y="82" text-anchor="middle" font-size="9" fill="#94a3b8">Natural language or voice input</text>

  <!-- Arrow -->
  <line x1="350" y1="92" x2="350" y2="108" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: IntentInput -->
  <rect x="250" y="110" width="200" height="35" rx="8" fill="#0c4a6e" fill-opacity="0.4" stroke="#38bdf8" stroke-width="0.8" filter="url(#s)"/>
  <text x="350" y="132" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7dd3fc">IntentInput.tsx</text>

  <!-- Arrow -->
  <line x1="350" y1="145" x2="350" y2="161" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: IPC -->
  <rect x="200" y="163" width="300" height="28" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="350" y="182" text-anchor="middle" font-size="10" font-weight="500" fill="#94a3b8">⚡ invoke("process_intent") → Tauri IPC</text>

  <!-- Arrow -->
  <line x1="350" y1="191" x2="350" y2="207" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Refractive Core -->
  <rect x="195" y="209" width="310" height="32" rx="8" fill="#064e3b" fill-opacity="0.4" stroke="#34d399" stroke-width="1" filter="url(#s)"/>
  <text x="350" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">🔬 lib.rs → refractive_core.rs</text>

  <!-- Arrow -->
  <line x1="350" y1="241" x2="350" y2="257" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: Multi-Agent Pipeline (big box) -->
  <rect x="80" y="259" width="540" height="175" rx="10" fill="#0f172a" stroke="#818cf8" stroke-width="1.2" filter="url(#s)"/>
  <text x="350" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#c4b5fd">🤖 LangGraph Multi-Agent Pipeline</text>
  <text x="350" y="295" text-anchor="middle" font-size="9" fill="#64748b">langgraph_collab.rs</text>

  <!-- Agent flow inside -->
  <rect x="110" y="308" width="120" height="35" rx="6" fill="#312e81" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.6"/>
  <text x="170" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Orchestrator</text>

  <line x1="230" y1="325" x2="260" y2="325" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="265" y="308" width="120" height="35" rx="6" fill="#312e81" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.6"/>
  <text x="325" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Memory Keeper</text>

  <line x1="385" y1="325" x2="415" y2="325" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="420" y="308" width="120" height="35" rx="6" fill="#312e81" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.6"/>
  <text x="480" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Reasoner</text>

  <!-- Second row -->
  <line x1="480" y1="343" x2="480" y2="358" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="420" y="360" width="120" height="35" rx="6" fill="#312e81" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.6"/>
  <text x="480" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Tool Smith</text>

  <line x1="420" y1="377" x2="388" y2="377" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="265" y="360" width="120" height="35" rx="6" fill="#312e81" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.6"/>
  <text x="325" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Sentinel</text>

  <line x1="265" y1="377" x2="233" y2="377" stroke="#818cf8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Consensus -->
  <rect x="110" y="360" width="120" height="35" rx="6" fill="#1e1b4b" fill-opacity="0.6" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="170" y="378" text-anchor="middle" font-size="10" font-weight="700" fill="#e9d5ff">🗳️ Consensus</text>
  <text x="170" y="391" text-anchor="middle" font-size="8" fill="#94a3b8">Debate + Vote</text>

  <!-- Step 5 label -->
  <text x="560" y="425" text-anchor="end" font-size="8" fill="#64748b">Argument types: Position · Challenge · Rebuttal · Support · Concession</text>

  <!-- Arrow down from pipeline -->
  <line x1="350" y1="434" x2="350" y2="453" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Spectrum Graph -->
  <rect x="195" y="455" width="310" height="35" rx="8" fill="#0e7490" fill-opacity="0.3" stroke="#22d3ee" stroke-width="1" filter="url(#s)"/>
  <text x="350" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#67e8f9">📦 spectrum_graph.rs → Store Nodes + Edges</text>

  <!-- Arrow -->
  <line x1="350" y1="490" x2="350" y2="506" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 7: Sandbox Sign -->
  <rect x="195" y="508" width="310" height="35" rx="8" fill="#166534" fill-opacity="0.3" stroke="#22c55e" stroke-width="1" filter="url(#s)"/>
  <text x="350" y="531" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac">🛡️ sandbox_prism.rs → Sign + Audit</text>

  <!-- Arrow -->
  <line x1="350" y1="543" x2="350" y2="559" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Step 8: Response back -->
  <rect x="200" y="561" width="300" height="28" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="350" y="580" text-anchor="middle" font-size="10" font-weight="500" fill="#94a3b8">⚡ IPC Response → Frontend</text>

  <!-- Arrow -->
  <line x1="350" y1="589" x2="350" y2="605" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 9: UI Render -->
  <rect x="170" y="607" width="360" height="45" rx="8" fill="#164e63" fill-opacity="0.5" stroke="#22d3ee" stroke-width="1" filter="url(#s)"/>
  <text x="350" y="628" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">💬 MainView.tsx Renders AI Response</text>
  <text x="350" y="644" text-anchor="middle" font-size="9.5" fill="#94a3b8">+ Proactive suggestion cards auto-process on click</text>

  <!-- Footer -->
  <text x="350" y="672" text-anchor="middle" font-size="9" fill="#475569">PrismOS-AI v0.2.1 · Patent Pending · 100% Local Processing</text>
</svg>
