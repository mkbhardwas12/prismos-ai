<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Animated prism gradient — hue rotation -->
    <linearGradient id="pgAnim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb">
        <animate attributeName="stop-color" values="#2563eb;#8b5cf6;#ec4899;#2563eb" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#2563eb;#8b5cf6;#06b6d4" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#06b6d4;#2563eb;#10b981" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Spectrum beam colors -->
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <!-- Input beam gradient -->
    <linearGradient id="ib" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Traveling light pulse on input beam -->
    <linearGradient id="ibPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0">
        <animate attributeName="offset" values="-0.3;1" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.15" stop-color="#fff" stop-opacity="1">
        <animate attributeName="offset" values="-0.15;1.15" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.3" stop-color="#fff" stop-opacity="0">
        <animate attributeName="offset" values="0;1.3" dur="2.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="g"><feGaussianBlur stdDeviation="1" result="bl"/><feMerge><feMergeNode in="bl"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gBig"><feGaussianBlur stdDeviation="2" result="bl"/><feMerge><feMergeNode in="bl"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <!-- Vertex glow -->
    <radialGradient id="vtxGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === Input beam (white light entering prism) === -->
  <line x1="2" y1="30" x2="22" y2="30" stroke="url(#ib)" stroke-width="1.5" filter="url(#g)"/>
  <!-- Traveling pulse along input beam -->
  <line x1="2" y1="30" x2="22" y2="30" stroke="url(#ibPulse)" stroke-width="2" filter="url(#g)"/>

  <!-- === Refracted spectrum beams (shooting outward with staggered animation) === -->
  <!-- Red beam -->
  <line x1="44" y1="24" x2="62" y2="14" stroke="url(#b1)" stroke-width="1.2" filter="url(#g)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0s" repeatCount="indefinite"/>
  </line>
  <!-- Orange beam -->
  <line x1="44" y1="27" x2="62" y2="22" stroke="url(#b2)" stroke-width="1.2" filter="url(#g)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.15s" repeatCount="indefinite"/>
  </line>
  <!-- Green beam -->
  <line x1="44" y1="30" x2="62" y2="32" stroke="url(#b3)" stroke-width="1.2" filter="url(#g)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <!-- Blue beam -->
  <line x1="44" y1="33" x2="62" y2="42" stroke="url(#b4)" stroke-width="1.2" filter="url(#g)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.45s" repeatCount="indefinite"/>
  </line>
  <!-- Violet beam -->
  <line x1="44" y1="36" x2="62" y2="50" stroke="url(#b5)" stroke-width="1.2" filter="url(#g)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- === Spectrum endpoint dots (pulsing) === -->
  <circle cx="62" cy="14" r="1.2" fill="#ef4444" filter="url(#g)">
    <animate attributeName="r" values="0.8;1.8;0.8" dur="2.5s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="22" r="1.2" fill="#f59e0b" filter="url(#g)">
    <animate attributeName="r" values="0.8;1.8;0.8" dur="2.5s" begin="0.15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="0.15s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="32" r="1.2" fill="#10b981" filter="url(#g)">
    <animate attributeName="r" values="0.8;1.8;0.8" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="42" r="1.2" fill="#3b82f6" filter="url(#g)">
    <animate attributeName="r" values="0.8;1.8;0.8" dur="2.5s" begin="0.45s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="0.45s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="50" r="1.2" fill="#a855f7" filter="url(#g)">
    <animate attributeName="r" values="0.8;1.8;0.8" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- === Prism body (breathing glow) === -->
  <polygon points="32,8 18,52 46,52" fill="url(#pgAnim)" fill-opacity="0.12" stroke="url(#pgAnim)" stroke-width="1.5">
    <animate attributeName="fill-opacity" values="0.08;0.2;0.08" dur="4s" repeatCount="indefinite"/>
  </polygon>
  <!-- Inner refraction shimmer -->
  <line x1="24" y1="30" x2="40" y2="30" stroke="#fff" stroke-width="0.5" opacity="0.1">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="28;32;28" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="28;32;28" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- === Top vertex glow (pulsing energy point) === -->
  <circle cx="32" cy="8" r="3" fill="url(#vtxGlow)" filter="url(#gBig)">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="8" r="1.5" fill="#fff" opacity="0.9">
    <animate attributeName="r" values="1;2;1" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
