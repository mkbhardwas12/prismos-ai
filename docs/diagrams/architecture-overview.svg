<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="878" height="518" rx="13" fill="none" stroke="#334155" stroke-width="0.5"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="url(#cyan)" filter="url(#glow)">PrismOS-AI — System Architecture</text>

  <!-- ═══ FRONTEND LAYER ═══ -->
  <rect x="40" y="55" width="800" height="95" rx="10" fill="#0f172a" stroke="#06b6d4" stroke-width="1.2" filter="url(#s)"/>
  <text x="60" y="75" font-size="11" font-weight="700" fill="#06b6d4" letter-spacing="1.5">FRONTEND</text>
  <text x="780" y="75" text-anchor="end" font-size="10" fill="#64748b">React 18 · TypeScript · Vite</text>

  <!-- Frontend boxes -->
  <rect x="60" y="88" width="150" height="48" rx="7" fill="#164e63" fill-opacity="0.5" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="135" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">🧠 Intent Console</text>
  <text x="135" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">NL input + voice I/O</text>

  <rect x="225" y="88" width="150" height="48" rx="7" fill="#164e63" fill-opacity="0.5" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="300" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">🌈 Spectrum Graph</text>
  <text x="300" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">7D knowledge viz</text>

  <rect x="390" y="88" width="150" height="48" rx="7" fill="#164e63" fill-opacity="0.5" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="465" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">🤖 Active Agents</text>
  <text x="465" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">Debate + Sandbox</text>

  <rect x="555" y="88" width="130" height="48" rx="7" fill="#164e63" fill-opacity="0.5" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="620" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">📊 Daily Brief</text>
  <text x="620" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">Morning / evening</text>

  <rect x="700" y="88" width="120" height="48" rx="7" fill="#164e63" fill-opacity="0.5" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="760" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#a5f3fc">⏳ Timeline</text>
  <text x="760" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">History view</text>

  <!-- ═══ IPC BRIDGE ═══ -->
  <rect x="120" y="160" width="640" height="28" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="440" y="179" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">⚡ Tauri 2.0 IPC Bridge — invoke() / emit() / listen()</text>
  <!-- arrows -->
  <line x1="440" y1="150" x2="440" y2="160" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="440" y1="188" x2="440" y2="200" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ═══ RUST BACKEND LAYER ═══ -->
  <rect x="40" y="200" width="800" height="185" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1.2" filter="url(#s)"/>
  <text x="60" y="220" font-size="11" font-weight="700" fill="#10b981" letter-spacing="1.5">RUST BACKEND</text>
  <text x="780" y="220" text-anchor="end" font-size="10" fill="#64748b">Edition 2021 · Async Tokio</text>

  <!-- Refractive Core -->
  <rect x="60" y="235" width="370" height="60" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="0.8"/>
  <text x="245" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#6ee7b7">🔬 Refractive Core</text>
  <text x="245" y="273" text-anchor="middle" font-size="9.5" fill="#94a3b8">Intent → 5-Agent Pipeline → Spectrum Graph → Response</text>
  <text x="245" y="287" text-anchor="middle" font-size="9" fill="#64748b">refractive_core.rs + langgraph_collab.rs</text>

  <!-- Ollama Bridge -->
  <rect x="445" y="235" width="185" height="60" rx="8" fill="#7c2d12" fill-opacity="0.3" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="537" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#fcd34d">🦙 Ollama Bridge</text>
  <text x="537" y="273" text-anchor="middle" font-size="9.5" fill="#94a3b8">Local LLM inference</text>
  <text x="537" y="287" text-anchor="middle" font-size="9" fill="#64748b">Streaming + batch</text>

  <!-- Audit Log -->
  <rect x="645" y="235" width="175" height="60" rx="8" fill="#1e1b4b" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.8"/>
  <text x="732" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#a5b4fc">📋 Audit Log</text>
  <text x="732" y="273" text-anchor="middle" font-size="9.5" fill="#94a3b8">SHA-256 chained trail</text>
  <text x="732" y="287" text-anchor="middle" font-size="9" fill="#64748b">Tamper-proof</text>

  <!-- Agent row -->
  <rect x="60" y="305" width="130" height="38" rx="6" fill="#0c4a6e" fill-opacity="0.4" stroke="#38bdf8" stroke-width="0.6"/>
  <text x="125" y="321" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7dd3fc">Orchestrator</text>
  <text x="125" y="335" text-anchor="middle" font-size="8" fill="#64748b">Routes workflows</text>

  <rect x="200" y="305" width="130" height="38" rx="6" fill="#0c4a6e" fill-opacity="0.4" stroke="#38bdf8" stroke-width="0.6"/>
  <text x="265" y="321" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7dd3fc">Memory Keeper</text>
  <text x="265" y="335" text-anchor="middle" font-size="8" fill="#64748b">Graph persistence</text>

  <rect x="340" y="305" width="105" height="38" rx="6" fill="#0c4a6e" fill-opacity="0.4" stroke="#38bdf8" stroke-width="0.6"/>
  <text x="392" y="321" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7dd3fc">Reasoner</text>
  <text x="392" y="335" text-anchor="middle" font-size="8" fill="#64748b">Deep analysis</text>

  <rect x="455" y="305" width="115" height="38" rx="6" fill="#0c4a6e" fill-opacity="0.4" stroke="#38bdf8" stroke-width="0.6"/>
  <text x="512" y="321" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7dd3fc">Tool Smith</text>
  <text x="512" y="335" text-anchor="middle" font-size="8" fill="#64748b">WASM execution</text>

  <rect x="580" y="305" width="105" height="38" rx="6" fill="#0c4a6e" fill-opacity="0.4" stroke="#38bdf8" stroke-width="0.6"/>
  <text x="632" y="321" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7dd3fc">Sentinel</text>
  <text x="632" y="335" text-anchor="middle" font-size="8" fill="#64748b">Security guard</text>

  <!-- Consensus badge -->
  <rect x="700" y="305" width="120" height="38" rx="6" fill="#312e81" fill-opacity="0.4" stroke="#818cf8" stroke-width="0.6"/>
  <text x="760" y="321" text-anchor="middle" font-size="9.5" font-weight="600" fill="#c4b5fd">🗳️ Consensus</text>
  <text x="760" y="335" text-anchor="middle" font-size="8" fill="#64748b">Debate + voting</text>

  <!-- ═══ Spectrum Graph / Sandbox / You-Port ═══ -->
  <rect x="60" y="352" width="280" height="25" rx="5" fill="#0e7490" fill-opacity="0.2" stroke="#22d3ee" stroke-width="0.6"/>
  <text x="200" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#67e8f9">📦 Spectrum Graph (SQLite · 7D)</text>

  <rect x="350" y="352" width="240" height="25" rx="5" fill="#166534" fill-opacity="0.2" stroke="#22c55e" stroke-width="0.6"/>
  <text x="470" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">🛡️ Sandbox Prism (WASM)</text>

  <rect x="600" y="352" width="220" height="25" rx="5" fill="#78350f" fill-opacity="0.2" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="710" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#fde68a">🔄 You-Port (AES-GCM)</text>

  <!-- ═══ STORAGE + LLM LAYER ═══ -->
  <rect x="40" y="398" width="390" height="55" rx="10" fill="#0f172a" stroke="#06b6d4" stroke-width="1" filter="url(#s)"/>
  <text x="60" y="418" font-size="11" font-weight="700" fill="#06b6d4" letter-spacing="1">STORAGE</text>
  <text x="235" y="433" text-anchor="middle" font-size="10" fill="#94a3b8">SQLite — nodes · edges · intent_log · spectra</text>
  <text x="235" y="447" text-anchor="middle" font-size="9" fill="#64748b">App Data: {platform}/com.prismos.app/</text>

  <rect x="450" y="398" width="390" height="55" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="1" filter="url(#s)"/>
  <text x="470" y="418" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="1">LOCAL LLM</text>
  <text x="645" y="433" text-anchor="middle" font-size="10" fill="#94a3b8">Ollama — mistral · llama3 · phi3 · codellama</text>
  <text x="645" y="447" text-anchor="middle" font-size="9" fill="#64748b">100% on-device · http://localhost:11434</text>

  <!-- Footer badges -->
  <rect x="160" y="470" width="100" height="22" rx="11" fill="#064e3b" fill-opacity="0.5" stroke="#10b981" stroke-width="0.6"/>
  <text x="210" y="485" text-anchor="middle" font-size="9" font-weight="600" fill="#6ee7b7">🔒 Local-First</text>

  <rect x="275" y="470" width="95" height="22" rx="11" fill="#1e1b4b" fill-opacity="0.5" stroke="#818cf8" stroke-width="0.6"/>
  <text x="322" y="485" text-anchor="middle" font-size="9" font-weight="600" fill="#c4b5fd">🚫 No Cloud</text>

  <rect x="385" y="470" width="120" height="22" rx="11" fill="#78350f" fill-opacity="0.5" stroke="#f59e0b" stroke-width="0.6"/>
  <text x="445" y="485" text-anchor="middle" font-size="9" font-weight="600" fill="#fde68a">🛡️ Patent Pending</text>

  <rect x="520" y="470" width="110" height="22" rx="11" fill="#0c4a6e" fill-opacity="0.5" stroke="#22d3ee" stroke-width="0.6"/>
  <text x="575" y="485" text-anchor="middle" font-size="9" font-weight="600" fill="#67e8f9">📡 No Telemetry</text>

  <text x="440" y="510" text-anchor="middle" font-size="9" fill="#475569">© 2026 Manish Kumar · PrismOS-AI v0.2.1 · MIT License</text>
</svg>
